<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Login</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <h1>Teacher Login</h1>
  <form id="teacherLoginForm">
    <input type="email" id="teacherEmail" placeholder="Email" required>
    <input type="password" id="teacherPassword" placeholder="Password" required>
    <button type="submit">Login</button>
    <button type="button" onclick="window.location.href='index.html'">Back</button>

  </form>
  <p id="loginMessage" style="color:red;"></p>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    var { SUPABASE_URL, SUPABASE_ANON_KEY } = window.CYBERKIDS_CONFIG;
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("teacherLoginForm");
  const msg = document.getElementById("loginMessage");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.textContent = "";

    const email = document.getElementById("teacherEmail").value.trim();
    const password = document.getElementById("teacherPassword").value.trim();

    if (!email || !password) {
      msg.textContent = "Please enter email and password.";
      return;
    }

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email.toLowerCase(),
        password
      });

      if (error || !data.session) {
        msg.textContent = "Invalid email or password.";
        return;
      }

      const { data: profile, error: profileError } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", data.user.id)
        .single();

      if (profileError || profile?.role !== "teacher") {
        await supabase.auth.signOut();
        msg.textContent = "This account is not a teacher account.";
        return;
      }

      localStorage.setItem("teacherEmail", email.toLowerCase());
      localStorage.setItem("userRole", "teacher");
      window.location.href = "teacherDashboard.html";
    } catch (err) {
      console.error("Unexpected error:", err);
      msg.textContent = "Unexpected error. Check console.";
    }
  });
</script>
  <script src="appShell.js?v=1"></script>


</body>
</html>
