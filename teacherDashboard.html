<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <h1>Teacher Dashboard</h1>
  <button onclick="logout()">Logout</button>
  <p>View all students and their progress like an admin!</p>

  <div id="teacherStudentProgress">
    <!-- JS will fill student progress dynamically -->
  </div>

  <button id="showTeacherLeaderboard" style="margin-top:15px;">Show Children Leaderboard</button>
  <div id="teacherLeaderboardContainer" style="display:none; margin-top:20px;"></div>

  <!-- Supabase Library -->
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    var { SUPABASE_URL, SUPABASE_ANON_KEY } = window.CYBERKIDS_CONFIG;
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let teacherEmail = localStorage.getItem("teacherEmail");

    async function requireTeacherSession() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = "teacherLogin.html";
        return null;
      }

      const { data: profile } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .single();

      if (profile?.role !== "teacher") {
        await supabase.auth.signOut();
        window.location.href = "teacherLogin.html";
        return null;
      }

      teacherEmail = user.email.toLowerCase();
      localStorage.setItem("teacherEmail", teacherEmail);
      return user;
    }

    async function logout() {
      await supabase.auth.signOut();
      localStorage.removeItem("teacherEmail");
      localStorage.removeItem("userRole");
      window.location.href = "teacherLogin.html";
    }

    async function loadAllChildren() {
      const user = await requireTeacherSession();
      if (!user) return;
      const { data, error } = await supabase
        .from("children")
        .select("firstName, lastName, email, age, progress");

      const container = document.getElementById("teacherStudentProgress");

      if (error) {
        container.textContent = "Error loading data.";
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        container.textContent = "No children found.";
        return;
      }

      let tableHTML = `
        <table border="1" style="margin:auto; border-collapse:collapse;">
          <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Age</th>
            <th>Games Completed</th>
            <th>Quizzes Completed</th>
            <th>Lessons Completed</th>
          </tr>
      `;

      data.forEach(child => {
        const progress = child.progress || { gamesCompleted: 0, quizzesCompleted: 0, lessonsCompleted: 0 };
        tableHTML += `
          <tr>
            <td>${child.firstName || "-"}</td>
            <td>${child.lastName || "-"}</td>
            <td>${child.email || "-"}</td>
            <td>${child.age || "-"}</td>
            <td>${progress.gamesCompleted}</td>
            <td>${progress.quizzesCompleted}</td>
            <td>${progress.lessonsCompleted}</td>
          </tr>
        `;
      });

      tableHTML += "</table>";
      container.innerHTML = tableHTML;
    }

    loadAllChildren();

    document.getElementById("showTeacherLeaderboard").addEventListener("click", async () => {
      const user = await requireTeacherSession();
      if (!user) return;
      const container = document.getElementById("teacherLeaderboardContainer");
      container.style.display = "block";
      container.innerHTML = "<p>Loading leaderboard...</p>";

      const { data, error } = await supabase
        .from("child_leaderboard")
        .select("firstName, lastName, points")
        .order("points", { ascending: false });

      if (error) {
        container.innerHTML = "Error loading leaderboard.";
        console.error(error);
        return;
      }

      let tableHTML = `
        <h3>Students Leaderboard</h3>
        <table border="1" style="margin:auto; border-collapse:collapse; width:70%; box-shadow:0 0 10px rgba(0,0,0,0.1);">
          <tr style="background-color:#0077b6; color:white;">
            <th>First Name</th>
            <th>Last Name</th>
            <th>Points</th>
          </tr>
      `;

      data.forEach(child => {
        tableHTML += `
          <tr style="text-align:center; background-color:${child.points > 0 ? '#f1faff' : '#fff'};">
            <td>${child.firstName}</td>
            <td>${child.lastName}</td>
            <td>${child.points || 0}</td>
          </tr>
        `;
      });

      tableHTML += "</table>";
      container.innerHTML = tableHTML;
    });
  </script>

  <hr>
  <h2>Manage Educational Content</h2>
  <p>Select an activity to show or hide for students.</p>

  <select id="contentSelect"></select>
  <button id="showBtn">Show to Students</button>
  <button id="hideBtn">Hide from Students</button>

  <div id="contentTable" style="margin-top: 15px;"></div>

  <script>
    async function loadContentList() {
      const user = await requireTeacherSession();
      if (!user) return;
      const { data, error } = await supabase
        .from('content_library')
        .select('id, title, type, isvisible')
        .order('id', { ascending: true });

      if (error) return console.error(error);

      const dropdown = document.getElementById("contentSelect");
      dropdown.innerHTML = "";
      data.forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.id;
        opt.textContent = `${item.title} (${item.type}) ${item.isvisible ? 'Visible' : 'Hidden'}`;
        dropdown.appendChild(opt);
      });

      let tableHTML = `
        <table border="1" style="margin:auto;border-collapse:collapse;">
          <tr><th>Title</th><th>Type</th><th>Status</th></tr>`;
      data.forEach(item => {
        tableHTML += `
          <tr>
            <td>${item.title}</td>
            <td>${item.type}</td>
            <td>${item.isvisible ? "Visible" : "Hidden"}</td>
          </tr>`;
      });
      tableHTML += "</table>";
      document.getElementById("contentTable").innerHTML = tableHTML;
    }

    async function updateVisibility(show) {
      const user = await requireTeacherSession();
      if (!user) return;
      const id = document.getElementById("contentSelect").value;
      if (!id) return;

      const { error } = await supabase
        .from("content_library")
        .update({ isvisible: show, addedby: teacherEmail })
        .eq("id", id);

      if (error) return alert("Error updating content");
      alert(show ? "The activity is now visible to students." : "The activity is now hidden.");
      loadContentList();
    }

    document.getElementById("showBtn").addEventListener("click", () => updateVisibility(true));
    document.getElementById("hideBtn").addEventListener("click", () => updateVisibility(false));

    loadContentList();
  </script>
  <script src="appShell.js?v=1"></script>

</body>
</html>
