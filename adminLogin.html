<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <h1>Admin Login</h1>
  <p>Please enter your admin credentials</p>
  
  <form id="adminLoginForm">
    <input type="email" id="adminEmail" placeholder="Admin Email" required>
    <input type="password" id="adminPassword" placeholder="Admin Password" required>
    <button type="submit">Login</button>
    <button type="button" onclick="window.location.href='index.html'">Back to Home</button>
  </form>
  
  <p id="loginMessage" style="color:red; font-weight: bold;"></p>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var { SUPABASE_URL, SUPABASE_ANON_KEY } = window.CYBERKIDS_CONFIG;
    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("adminLoginForm");
    const msg = document.getElementById("loginMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      const email = document.getElementById("adminEmail").value.trim().toLowerCase();
      const password = document.getElementById("adminPassword").value.trim();

      if (!email || !password) {
        msg.textContent = "Please enter both email and password.";
        return;
      }

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error || !data.session) {
          msg.textContent = "Invalid admin credentials.";
          return;
        }

        const { data: profile, error: profileError } = await supabase
          .from("profiles")
          .select("role")
          .eq("id", data.user.id)
          .single();

        if (profileError || profile?.role !== "admin") {
          await supabase.auth.signOut();
          msg.textContent = "This account is not an admin account.";
          return;
        }

        localStorage.setItem("adminEmail", email);
        localStorage.setItem("userRole", "admin");
        window.location.href = "adminDashboard.html";
      } catch (err) {
        console.error("Unexpected error:", err);
        msg.textContent = "Unexpected error. Check console.";
      }
    });
  </script>
  <script src="appShell.js?v=1"></script>

</body>
</html>
